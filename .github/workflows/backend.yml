name: Backend CI

on:
  pull_request:
    paths:
      - "Aegis-Backend/**"
      - ".github/workflows/backend.yml"
  push:
    branches:
      - main
    paths:
      - "Aegis-Backend/**"
      - ".github/workflows/backend.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Aegis-Backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Aegis-Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test
