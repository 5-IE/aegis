services:
  mysql:
    image: mysql:8.0
    container_name: aegis-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: AEGIS
      MYSQL_USER: aegis
      MYSQL_PASSWORD: aegispassword
    ports:
      - "3306:3306"
    volumes:
      - aegis-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  aegis-mysql-data:
